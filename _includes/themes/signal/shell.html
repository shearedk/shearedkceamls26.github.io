<header class="mobile-header" id="mobileHeader">
  <a href="{{ '/' | relative_url }}" class="mobile-header__brand" aria-label="{{ site.program }} — home">
    {% if site.logo_on_dark %}
      <img src="{{ site.logo_on_dark | relative_url }}" alt="{{ site.program }}" class="mobile-header__logo">
    {% else %}
      <span>{{ site.program }}</span>
    {% endif %}
  </a>
  <button class="mobile-header__toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>
</header>

<div class="site-container">
  <nav class="site-nav" id="siteNav" aria-label="Main navigation">
    <div class="site-nav__brand">
      {% if site.logo_on_dark %}
      <img src="{{ site.logo_on_dark | relative_url }}" alt="{{ site.program }}" class="site-nav__logo" />
      {% endif %}
      <span class="site-nav__program">{{ site.program }}</span>
      <span class="site-nav__year">Summer {{ site.year }}</span>
    </div>
    <ul class="site-nav__links">
      <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' or page.url == '/index.html' %}class="active"{% endif %}>Home</a></li>
      <li><a href="{{ '/about-me.html' | relative_url }}" {% if page.url == '/about-me.html' %}class="active"{% endif %}>About Me</a></li>
      <li><a href="{{ '/about-my-mentor.html' | relative_url }}" {% if page.url == '/about-my-mentor.html' %}class="active"{% endif %}>Mentors</a></li>
      <li><a href="{{ '/about-my-project.html' | relative_url }}" {% if page.url == '/about-my-project.html' %}class="active"{% endif %}>Project</a></li>
      <li><a href="{{ '/my-blog.html' | relative_url }}" {% if page.url == '/my-blog.html' or page.layout == 'post' %}class="active"{% endif %}>Blog</a></li>
    </ul>
  </nav>

  <main class="content-area">
    {{ content }}
  </main>
</div>

<footer class="site-footer">
  <p>{{ site.program }} Summer {{ site.year }}</p>
</footer>

<div class="nav-overlay" id="navOverlay"></div>
<script src="{{ '/assets/js/themes/signal.js' | relative_url }}" defer></script>
